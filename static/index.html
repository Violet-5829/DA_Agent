<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据分析 Agent - 智能数据助手</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #2563EB; --primary-dark: #1D4ED8; --primary-light: #DBEAFE;
  --bg: #F8FAFC; --bg-white: #FFFFFF; --text: #1E293B; --text-secondary: #64748B;
  --border: #E2E8F0; --radius: 12px; --transition: 0.2s cubic-bezier(.4,0,.2,1);
  --shadow: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; display: flex;
}

/* Sidebar */
.sidebar {
  width: 280px; min-width: 280px; background: var(--bg-white);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  transition: transform var(--transition);
}
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.sidebar-logo {
  width: 36px; height: 36px; background: var(--primary); border-radius: 8px;
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px;
}
.sidebar-title { font-size: 16px; font-weight: 700; }
.sidebar-sub { font-size: 11px; color: var(--text-secondary); }
.conversation-list { flex: 1; overflow-y: auto; padding: 12px; }
.conv-item {
  padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;
  color: var(--text-secondary); margin-bottom: 4px; transition: var(--transition);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.conv-item:hover, .conv-item.active { background: var(--primary-light); color: var(--primary); }
.conv-item { position: relative; padding-right: 28px !important; }
.conv-del {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; border-radius: 50%; border: none;
  background: transparent; color: #94A3B8; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity var(--transition);
  line-height: 1;
}
.conv-item:hover .conv-del { opacity: 1; }
.conv-del:hover { background: #FEE2E2; color: #DC2626; }
.new-chat-btn {
  margin: 12px; padding: 10px; background: var(--primary); color: #fff;
  border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  transition: var(--transition);
}
.new-chat-btn:hover { background: var(--primary-dark); }
.sidebar-footer { padding: 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-secondary); text-align: center; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.header {
  padding: 16px 24px; background: var(--bg-white); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-secondary); font-size: 20px; }
.header-title { font-size: 18px; font-weight: 700; }
.header-badge { font-size: 11px; background: var(--primary-light); color: var(--primary); padding: 2px 10px; border-radius: 12px; font-weight: 600; }
.db-status { font-size: 12px; color: var(--text-secondary); }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.dot.online { background: #22C55E; } .dot.offline { background: #EF4444; }

/* Chat */
.chat-area { flex: 1; overflow-y: auto; padding: 24px; }
.welcome { text-align: center; padding: 60px 20px; max-width: 600px; margin: 0 auto; }
.welcome-icon {
  width: 64px; height: 64px; background: var(--primary); border-radius: 16px;
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 24px; margin: 0 auto 20px;
}
.welcome h2 { font-size: 24px; margin-bottom: 8px; }
.welcome p { color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
.quick-prompts { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.quick-prompt {
  padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px;
  background: var(--bg-white); cursor: pointer; font-size: 13px; color: var(--text);
  transition: var(--transition);
}
.quick-prompt:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

/* Messages */
.message { display: flex; gap: 12px; margin-bottom: 20px; max-width: 800px; }
.message.user { margin-left: auto; flex-direction: row-reverse; }
.message-avatar {
  width: 34px; height: 34px; border-radius: 8px; display: flex;
  align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.message.user .message-avatar { background: #DBEAFE; color: var(--primary); }
.message.assistant .message-avatar { background: #F0FDF4; color: #15803D; }
.message-content {
  background: var(--bg-white); border-radius: var(--radius); padding: 14px 18px;
  box-shadow: var(--shadow); border: 1px solid var(--border); line-height: 1.65; min-width: 0;
}
.message.user .message-content { background: var(--primary); color: #fff; border-color: var(--primary); }

.sql-block {
  background: #1E293B; color: #E2E8F0; border-radius: 8px; padding: 12px 16px;
  margin: 10px 0; font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; overflow-x: auto;
}
.sql-label { font-size: 10px; text-transform: uppercase; color: #94A3B8; letter-spacing: 0.1em; margin-bottom: 6px; }
.sql-block code { white-space: pre-wrap; word-break: break-all; }

.chart-container { margin: 10px 0; }
.chart-container img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }

.trace-toggle { font-size: 12px; color: var(--primary); cursor: pointer; margin-top: 8px; display: inline-block; }
.trace-detail { display: none; margin-top: 8px; padding: 10px 14px; background: #F1F5F9; border-radius: 8px; font-size: 12px; max-height: 200px; overflow-y: auto; }
.trace-detail.show { display: block; }
.trace-step { padding: 4px 0; border-bottom: 1px solid var(--border); }
.trace-step:last-child { border-bottom: none; }

/* Input */
.input-area { padding: 16px 24px 24px; background: var(--bg-white); border-top: 1px solid var(--border); }
.input-wrapper { max-width: 800px; margin: 0 auto; display: flex; gap: 8px; align-items: flex-end; }
.input-box {
  flex: 1; resize: none; border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 16px; font-size: 14px; font-family: inherit; outline: none;
  line-height: 1.5; max-height: 120px; transition: var(--transition);
}
.input-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
.send-btn {
  width: 44px; height: 44px; border-radius: 10px; border: none; background: var(--primary);
  color: #fff; cursor: pointer; font-size: 18px; transition: var(--transition); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.send-btn:hover { background: var(--primary-dark); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Loading */
.loading-dots { display: flex; gap: 4px; padding: 4px 0 8px; }
.loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); animation: bounce 1.4s ease-in-out infinite both; }
.loading-dots span:nth-child(1) { animation-delay: -0.32s; }
.loading-dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
.loading-text { font-size: 13px; color: var(--text-secondary); margin-top: 4px; transition: opacity 0.4s; }

/* Responsive */
.overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.4); z-index: 9; }
.overlay.show { display: block; }
@media (max-width: 768px) {
  .sidebar { position: fixed; left: 0; top: 0; height: 100%; z-index: 10; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .menu-btn { display: block; }
  .chat-area { padding: 16px; }
  .input-area { padding: 12px 16px; }
  .message { max-width: 100%; }
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">DA</div>
    <div><div class="sidebar-title">数据分析 Agent</div><div class="sidebar-sub">智能数据助手</div></div>
  </div>
  <button class="new-chat-btn" onclick="newChat()">+ 新建对话</button>
  <div class="conversation-list" id="convList">
    <div class="conv-item active" data-cid="default" onclick="switchConv('default')">默认对话</div>
  </div>
  <div class="sidebar-footer">DA Agent v1.0 · Powered by AI</div>
</aside>

<div class="main">
  <header class="header">
    <div class="header-left">
      <button class="menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <span class="header-title">数据分析 Agent</span>
      <span class="header-badge">v1.0</span>
    </div>
    <div class="db-status"><span class="dot online" id="dbDot"></span><span id="dbStatus">检测中...</span></div>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="welcome">
      <div class="welcome-icon">DA</div>
      <h2>你好，我是你的数据分析助手</h2>
      <p>用自然语言向我提问，我会帮你查询数据库、生成图表、总结结论。</p>
      <div class="quick-prompts" id="quickPrompts"></div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea class="input-box" id="inputBox" placeholder="输入你的数据分析问题..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#8593;</button>
    </div>
  </div>
</div>

<script>
let conversationId = 'default';
let conversations = { 'default': { title: '默认对话', messages: [] } };
let isLoading = false;

const FUN_TIPS = [
  '正在理解你的问题...', '查询数据库魔法进行中...', '正在生成精妙的 SQL...',
  '数据跑起来啦...', '正在整理分析思路...', '让 AI 认真思考一下...',
  '泡杯咖啡，数据马上就好...', '正在挖掘数据宝藏...', '图表渲染中...',
  '快要出结果了...', 'AI 正在努力工作中...', '数据加载中，请稍候...',
];
let loadingTipTimer = null;

const DEFAULT_PROMPTS = ['总共有多少条数据？','按分类统计数量并画柱状图','分析数据的关键指标','流失用户的特征是什么？','平均数值是多少？按分组统计','最近数据有什么趋势？'];

document.addEventListener('DOMContentLoaded', () => {
  checkHealth();
  renderPrompts();
  document.getElementById('inputBox').focus();
});

async function checkHealth() {
  try {
    const r = await fetch('/health'); const d = await r.json();
    const dot = document.getElementById('dbDot');
    const status = document.getElementById('dbStatus');
    if (d.db_connected) {
      dot.className = 'dot online';
      status.textContent = '数据库已连接 · ' + d.tables_loaded + ' 张表';
      // Dynamic prompts from table data
      const tables = Object.keys(d.metadata_summary || {});
      if (tables.length > 0) {
        const cols = (d.metadata_summary[tables[0]] || []).map(c => c.column);
        renderPrompts(tables[0], cols);
      }
    } else {
      dot.className = 'dot offline'; status.textContent = '数据库未连接';
    }
  } catch(e) {
    document.getElementById('dbStatus').textContent = '服务未启动';
    document.getElementById('dbDot').className = 'dot offline';
  }
}

function renderPrompts(table, cols) {
  const prompts = table
    ? [
        `${table} 表总共有多少条数据？`,
        `按${cols[1] || '分类'}统计${table}数量`,
        `分析${table}的关键指标`,
        `统计${table}各分组的平均值`
      ]
    : DEFAULT_PROMPTS;
  document.getElementById('quickPrompts').innerHTML = prompts
    .map(p => `<div class="quick-prompt" onclick="sendPrompt(this)">${p}</div>`).join('');
}

function sendPrompt(el) { document.getElementById('inputBox').value = el.textContent; sendMessage(); }

async function sendMessage() {
  if (isLoading) return;
  const inputBox = document.getElementById('inputBox');
  const question = inputBox.value.trim();
  if (!question) return;

  const chatArea = document.getElementById('chatArea');
  const welcome = chatArea.querySelector('.welcome');
  if (welcome) welcome.remove();

  isLoading = true; inputBox.value = ''; document.getElementById('sendBtn').disabled = true;
  autoResize();

  addMessage('user', question);
  addToHistory('user', question);
  const loadingMsg = addLoadingMessage();

  try {
    const r = await fetch('/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, conversation_id: conversationId })
    });
    if (!r.ok) {
      const errData = await r.json().catch(() => ({}));
      throw new Error(errData.error || errData.detail || `HTTP ${r.status}`);
    }
    const data = await r.json();
    if (loadingMsg._stopTips) loadingMsg._stopTips();
    loadingMsg.remove();
    addAssistantMessage(data);
    addToHistory('assistant', data.answer);
    updateConvTitle(question);
  } catch(e) {
    if (loadingMsg._stopTips) loadingMsg._stopTips();
    loadingMsg.remove();
    addMessage('assistant', '❌ ' + escapeHtml(e.message || '请求失败，请检查服务是否正常运行'));
  }

  isLoading = false; document.getElementById('sendBtn').disabled = false; inputBox.focus();
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.innerHTML = '<div class="message-avatar">' + (role === 'user' ? '我' : 'AI') + '</div><div class="message-content">' + content + '</div>';
  document.getElementById('chatArea').appendChild(div);
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
  return div;
}

function addLoadingMessage() {
  const div = document.createElement('div'); div.className = 'message assistant';
  const tipId = 'tip_' + Date.now();
  div.innerHTML = '<div class="message-avatar">AI</div><div class="message-content"><div class="loading-dots"><span></span><span></span><span></span></div><div class="loading-text" id="' + tipId + '">' + FUN_TIPS[0] + '</div></div>';
  document.getElementById('chatArea').appendChild(div);
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;

  let idx = 1;
  loadingTipTimer = setInterval(() => {
    const el = document.getElementById(tipId);
    if (el) { el.style.opacity = '0'; setTimeout(() => { el.textContent = FUN_TIPS[idx % FUN_TIPS.length]; el.style.opacity = '1'; }, 200); }
    idx++;
  }, 2500);
  div._stopTips = () => { clearInterval(loadingTipTimer); };
  return div;
}

function addAssistantMessage(data) {
  let html = '<div style="white-space:pre-wrap;line-height:1.7;">' + escapeHtml(data.answer) + '</div>';
  if (data.sql_or_code) {
    html += '<div class="sql-block"><div class="sql-label">SQL</div><code>' + escapeHtml(data.sql_or_code) + '</code></div>';
  }
  if (data.chart_url) {
    html += '<div class="chart-container"><img src="' + data.chart_url + '" alt="图表" onclick="window.open(this.src)" loading="lazy"></div>';
  }
  if (data.reasoning_trace && data.reasoning_trace.length > 0) {
    const tid = 'trace_' + Date.now();
    html += '<span class="trace-toggle" onclick="document.getElementById(\'' + tid + '\').classList.toggle(\'show\')">查看推理过程 (' + data.reasoning_trace.length + ' 步)</span>';
    html += '<div class="trace-detail" id="' + tid + '">';
    data.reasoning_trace.forEach((s, i) => {
      html += '<div class="trace-step"><strong>' + (i+1) + '. ' + s.step + '</strong>: ' + escapeHtml(JSON.stringify(s).slice(0,200)) + '</div>';
    });
    html += '</div>';
  }
  const div = document.createElement('div'); div.className = 'message assistant';
  div.innerHTML = '<div class="message-avatar">AI</div><div class="message-content">' + html + '</div>';
  document.getElementById('chatArea').appendChild(div);
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
}

function addToHistory(role, content) {
  if (!conversations[conversationId]) conversations[conversationId] = { title: '新对话', messages: [] };
  conversations[conversationId].messages.push({ role, content, time: new Date().toISOString() });
}

function updateConvTitle(q) {
  const c = conversations[conversationId];
  if (c && c.title === '新对话') { c.title = q.slice(0, 20) + (q.length > 20 ? '...' : ''); renderConvList(); }
}

function newChat() { const id = 'conv_' + Date.now(); conversations[id] = { title: '新对话', messages: [] }; switchConv(id); }

function switchConv(id) {
  conversationId = id;
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector('[data-cid="' + id + '"]');
  if (item) item.classList.add('active');
  renderMessages(); closeSidebar();
}

function renderConvList() {
  const list = document.getElementById('convList'); list.innerHTML = '';
  for (const [id, conv] of Object.entries(conversations)) {
    const d = document.createElement('div');
    d.className = 'conv-item' + (id === conversationId ? ' active' : '');
    d.setAttribute('data-cid', id);
    d.innerHTML = '<span style="pointer-events:none">' + escapeHtml(conv.title) + '</span><button class="conv-del" title="删除对话" onclick="event.stopPropagation();deleteConv(\'' + id + '\')">&times;</button>';
    d.onclick = function() { switchConv(id); };
    list.appendChild(d);
  }
}

function deleteConv(id) {
  if (!confirm('确定删除这个对话吗？')) return;
  delete conversations[id];
  if (id === conversationId) {
    const remaining = Object.keys(conversations);
    if (remaining.length === 0) conversations['default'] = { title: '默认对话', messages: [] };
    switchConv(remaining[0] || 'default');
  }
  renderConvList();
}

function renderMessages() {
  const area = document.getElementById('chatArea');
  const msgs = conversations[conversationId]?.messages || [];
  if (msgs.length === 0) {
    area.innerHTML = '<div class="welcome"><div class="welcome-icon">DA</div><h2>你好，我是你的数据分析助手</h2><p>用自然语言向我提问，我会帮你查询数据库、生成图表、总结结论。</p><div class="quick-prompts" id="quickPrompts"></div></div>';
    checkHealth().then(() => {});
    return;
  }
  area.innerHTML = '';
  msgs.forEach(m => {
    if (m.role === 'user') {
      addMessage('user', m.content);
    } else if (m.role === 'assistant') {
      addMessage('assistant', m.content);
    }
  });
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize() { const b = document.getElementById('inputBox'); b.style.height = 'auto'; b.style.height = Math.min(b.scrollHeight, 120) + 'px'; }
document.getElementById('inputBox').addEventListener('input', autoResize);

function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
</script>
</body>
</html>
